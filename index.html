
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>Verify Captcha</title>
    <style>
        body{
            font-family: 'Poppins', sans-serif;
            background-color: #f5f5f5;
        }
        .headcp{
            font-size: 13px;
            margin-top: 100px;
            line-height: 20px;
            color: #000;
        }
        .genig{
            font-size: 12px;
            color: #1976d2;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .btnstle{
            margin-top: 20px;
        }
    </style>
</head>
<body>
        <div class="container">
            <div class="row">
                <div class="col m6 offset-m3 s12 valign-wrapper">
                    <div class="center-align">
                        <h5 class="headcp">Please enter the code from the image. Doing so helps prevent automated program from spamming the form or abuse this service</h5>
                        <img src="https://i.ibb.co/WWBtsw68/captcha.png" alt="">
                        <p class="genig">Generate new image</p>
                        <div class="input-field col s12">
                            <input id="captcha" type="text" class="validate">
                            <label for="captcha">Enter Code</label>
                        </div>
                            <button class="btnstle btn waves-effect waves-light" type="submit" name="action">Submit
                              <i class="material-icons right">send</i>
                            </button>
                    </div>  
                </div>
            </div>
        </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>    
</body>
</html>
